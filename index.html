<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARCHIVE SYSTEM</title>

<style>

html,body{

margin:0;

height:100%;

overflow:hidden;

background:#000;

color:#fff;

font-family:Arial;

}

/* 问题区 */

#app{

height:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}

.question{

font-size:40px;

margin-bottom:40px;

}

/* 按钮 */

button{

background:none;

border:2px solid white;

color:white;

padding:12px 28px;

font-size:20px;

cursor:pointer;

margin:10px;

transition:.3s;

}

button:hover{transform:scale(1.1);}

/* 红色闪屏 */

.flash{

position:fixed;

inset:0;

background:red;

opacity:0;

pointer-events:none;

animation:flash 3.5s infinite;

z-index:999;

}

@keyframes flash{

0%,92%,100%{opacity:0;}

93%{opacity:.12;}

94%{opacity:0;}

95%{opacity:.22;}

96%{opacity:0;}

}

/* 中空菱形眼睛 */

.eye{

position:fixed;

width:170px;

height:170px;

border:2px solid rgba(255,255,255,.18);

transform:rotate(45deg);

opacity:0;

pointer-events:none;

transition:2s;

}

.eye::after{

content:"";

position:absolute;

width:18px;

height:18px;

border:2px solid #fff;

background:transparent;

left:50%;

top:50%;

transform:translate(-50%,-50%) rotate(-45deg);

}

.eye.left{left:18%;top:22%;}

.eye.right{right:18%;top:22%;}

/* 手 */

.hand{

position:fixed;

left:-300px;

top:50%;

transform:translateY(-50%);

color:#00ffff;

font-size:70px;

animation:move 1.3s forwards;

}

@keyframes move{to{left:45%;}}

/* 红色界面 */

.red{

position:fixed;

inset:0;

background:#8b0000;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.red h1{

font-size:60px;

margin-bottom:30px;

}

/* 弹窗 */

.popup{

position:fixed;

background:black;

border:1px solid red;

color:red;

padding:10px 14px;

font-size:18px;

animation:pop .18s;

}

@keyframes pop{

from{transform:scale(.2);opacity:0;}

to{transform:scale(1);opacity:1;}

}

/* 最终铺屏 */

.final{

position:fixed;

inset:0;

background:black;

display:flex;

justify-content:center;

align-items:center;

color:red;

font-size:6vw;

animation:blink .8s infinite;

text-align:center;

}

@keyframes blink{50%{opacity:.5;}}

</style>

</head>

<body>

<div class="flash"></div>

<div class="eye left"></div>

<div class="eye right"></div>

<div id="app">

<div id="q" class="question">你知道什么是喜欢吗？</div>

<div id="btns">

<button onclick="q1()">知道</button>

<button onclick="q1()">不知道</button>

</div>

</div>

<script>

let step=0;

let runCount=0;

/* 鼠标跟随（菱形眼） */

document.addEventListener("mousemove",(e)=>{

document.querySelectorAll(".eye").forEach(el=>{

const r=el.getBoundingClientRect();

const cx=r.left+r.width/2;

const cy=r.top+r.height/2;

const a=Math.atan2(e.clientY-cy,e.clientX-cx);

const x=Math.cos(a)*16;

const y=Math.sin(a)*16;

el.style.opacity=.35;

el.style.transform=`rotate(45deg) translate(${x}px,${y}px)`;

});

});

/* Q1 */

function q1(){

step=1;

document.getElementById("q").innerText="你会出轨吗？";

document.getElementById("btns").innerHTML=`

<button onclick="q2()">会</button>

<button onclick="q2()">不会</button>

`;

}

/* Q2 */

function q2(){

step=2;

document.querySelectorAll(".eye").forEach(e=>e.style.opacity=.45);

document.getElementById("q").innerText="你会忘记这段记录吗？";

document.getElementById("btns").innerHTML=`

<button id="yes" onclick="accept()">会</button>

<button id="no" onclick="escapeBtn()">不会</button>

`;

}

/* 不会逃跑 */

function escapeBtn(){

runCount++;

const no=document.getElementById("no");

const yes=document.getElementById("yes");

if(runCount<5){

no.style.position="absolute";

no.style.left=Math.random()*500-250+"px";

no.style.top=Math.random()*300-150+"px";

yes.style.transform=`scale(${1+runCount*0.22})`;

}else{

no.remove();

yes.style.transform="scale(2.6)";

yes.style.position="fixed";

yes.style.left="50%";

yes.style.top="55%";

yes.style.transform="translate(-50%,-50%) scale(2.6)";

}

}

/* 接受 */

function accept(){

const hand=document.createElement("div");

hand.className="hand";

hand.innerText="▣ ARCHIVE LINKING";

document.body.appendChild(hand);

setTimeout(showRed,1300);

}

/* 红色界面 */

function showRed(){

document.body.innerHTML=`

<div class="red">

<h1>系统已归档</h1>

<button onclick="final()">确认</button>

</div>

`;

}

/* 弹窗雨 */

function final(){

document.body.innerHTML="";

let i=0;

const t=setInterval(()=>{

spawn();

i++;

if(i>80) clearInterval(t);

},60);

setTimeout(()=>{

document.body.innerHTML=`

<div class="final">

我不允许你忘记我

<br>

<small style="font-size:2vw;opacity:.7;">

SYSTEM OVERRIDE OUTPUT

</small>

</div>

`;

},5000);

}

/* 弹窗 */

function spawn(){

const d=document.createElement("div");

d.className="popup";

d.innerText="记录无法删除";

d.style.left=Math.random()*100+"vw";

d.style.top=Math.random()*100+"vh";

document.body.appendChild(d);

}

</script>

</body>

</html>
